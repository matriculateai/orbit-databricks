command: ["uv", "run", "start-app"]
# databricks apps listen by default on port 8000

env:
  - name: MLFLOW_TRACKING_URI
    value: "databricks"
  - name: MLFLOW_REGISTRY_URI
    value: "databricks-uc"
  - name: API_PROXY
    value: "http://localhost:8000/invocations"
  - name: CHAT_APP_PORT
    value: "3000"
  - name: CHAT_PROXY_TIMEOUT_SECONDS
    value: "300"
  - name: MLFLOW_EXPERIMENT_ID
    valueFrom: "experiment"
  - name: ORBIT_SALES_SPACE_ID
    value: "01f0f68fecac127aa809b0185446d9e3"
  - name: ORBIT_STOCK_SPACE_ID
    value: "01f0f690c7cc1a21be7d36f0bd646318"
  - name: ORBIT_REPS_SPACE_ID
    value: "01f0f692052e19518188f1ab70963948"
  - name: ORBIT_FALLBACK_SPACE_ID
    value: "01f0f692a05414b4a070316fe4cd3323"
  - name: ORBIT_LLM_ENDPOINT
    value: "databricks-gemma-3-12b"
  # Databricks workspace configuration for dashboard embedding
  - name: DATABRICKS_HOST
    value: "https://dbc-2dd00323-bb3d.cloud.databricks.com"
  - name: DATABRICKS_WORKSPACE_ID
    value: "1691211321770811"
  # Dashboard IDs for AIBI client embedding
  - name: ORBIT_REP_MANAGER_DASHBOARD_ID
    value: "YOUR_REP_MANAGER_DASHBOARD_ID_HERE"
  - name: ORBIT_EXEC_DASHBOARD_ID
    value: "YOUR_EXEC_DASHBOARD_ID_HERE"