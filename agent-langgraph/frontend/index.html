<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orbit | Pharmaceutical Intelligence</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <nav class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <img src="/images/orbit-logo.png" alt="Orbit" class="logo-icon">
                    <span class="logo-text">Orbit</span>
                </div>
            </div>

            <div class="nav-section">
                <a href="/" class="nav-item active">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                    </svg>
                    <span>Chat</span>
                </a>
                <a href="/rep-dashboard.html" class="nav-item">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                        <circle cx="9" cy="7" r="4"/>
                        <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                        <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                    </svg>
                    <span>Rep Manager</span>
                </a>
                <a href="/exec-dashboard.html" class="nav-item">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 3v18h18"/>
                        <path d="M18 17V9"/>
                        <path d="M13 17V5"/>
                        <path d="M8 17v-3"/>
                    </svg>
                    <span>Executive</span>
                </a>
            </div>

            <div class="sidebar-footer">
                <div class="powered-by">
                    <span class="powered-text">Powered by</span>
                    <span class="senture-brand">Senture</span>
                </div>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="main-content">
            <div class="chat-container">
                <div class="chat-header">
                    <h1>Pharmaceutical Intelligence</h1>
                    <p>Ask questions about sales, inventory, and rep performance</p>
                </div>

                <div class="messages-container" id="messages">
                    <div class="welcome-message">
                        <div class="welcome-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <circle cx="12" cy="12" r="10"/>
                                <path d="M12 16v-4"/>
                                <path d="M12 8h.01"/>
                            </svg>
                        </div>
                        <h2>Welcome to Orbit</h2>
                        <p>Your AI-powered pharmaceutical intelligence assistant. Ask me about:</p>
                        <div class="suggestion-chips">
                            <button class="chip" onclick="sendSuggestion('What are the top selling products this quarter?')">Top selling products</button>
                            <button class="chip" onclick="sendSuggestion('Show me current stock levels for critical items')">Stock levels</button>
                            <button class="chip" onclick="sendSuggestion('How are my sales reps performing this month?')">Rep performance</button>
                        </div>
                    </div>
                </div>

                <div class="input-container">
                    <form id="chat-form" class="chat-input-form">
                        <div class="input-wrapper">
                            <textarea
                                id="user-input"
                                placeholder="Ask Orbit anything..."
                                rows="1"
                                autofocus
                            ></textarea>
                            <button type="submit" class="send-button" id="send-btn">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M22 2L11 13"/>
                                    <path d="M22 2L15 22L11 13L2 9L22 2Z"/>
                                </svg>
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <script src="/js/app.js"></script>
</body>
</html>
