<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rep Manager Dashboard | Orbit</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <nav class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <svg class="logo-icon" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="20" cy="20" r="18" stroke="url(#orbit-gradient)" stroke-width="2.5" fill="none"/>
                        <circle cx="20" cy="20" r="8" fill="url(#orbit-gradient)"/>
                        <circle cx="20" cy="6" r="3" fill="#6366f1"/>
                        <defs>
                            <linearGradient id="orbit-gradient" x1="0" y1="0" x2="40" y2="40">
                                <stop offset="0%" stop-color="#6366f1"/>
                                <stop offset="100%" stop-color="#8b5cf6"/>
                            </linearGradient>
                        </defs>
                    </svg>
                    <span class="logo-text">Orbit</span>
                </div>
            </div>

            <div class="nav-section">
                <a href="/" class="nav-item">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                    </svg>
                    <span>Chat</span>
                </a>
                <a href="/rep-dashboard.html" class="nav-item active">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                        <circle cx="9" cy="7" r="4"/>
                        <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                        <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                    </svg>
                    <span>Rep Manager</span>
                </a>
                <a href="/exec-dashboard.html" class="nav-item">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 3v18h18"/>
                        <path d="M18 17V9"/>
                        <path d="M13 17V5"/>
                        <path d="M8 17v-3"/>
                    </svg>
                    <span>Executive</span>
                </a>
            </div>

            <div class="sidebar-footer">
                <div class="powered-by">
                    <span class="powered-text">Powered by</span>
                    <span class="senture-brand">Senture</span>
                </div>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="main-content">
            <div class="dashboard-container">
                <div class="dashboard-header">
                    <h1>Rep Manager Dashboard</h1>
                    <p>Sales representative performance and activity metrics</p>
                </div>

                <div class="dashboard-frame-container" id="rep-dashboard-container">
                    <div class="dashboard-placeholder" id="rep-placeholder">
                        <svg class="placeholder-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <rect x="3" y="3" width="18" height="18" rx="2"/>
                            <path d="M3 9h18"/>
                            <path d="M9 21V9"/>
                        </svg>
                        <h3>Dashboard Not Configured</h3>
                        <p>Add your Databricks dashboard URL to <code>app.yaml</code></p>
                        <code class="config-hint">ORBIT_REP_MANAGER_DASHBOARD_URL</code>
                    </div>
                    <iframe
                        id="rep-dashboard-iframe"
                        class="dashboard-iframe hidden"
                        title="Rep Manager Dashboard"
                        frameborder="0"
                        allowfullscreen
                    ></iframe>
                </div>
            </div>
        </main>
    </div>

    <script>
        // Load dashboard URL from environment (passed via API)
        async function loadDashboard() {
            try {
                const response = await fetch('/api/config');
                const config = await response.json();

                if (config.repManagerDashboardUrl &&
                    config.repManagerDashboardUrl !== 'YOUR_REP_MANAGER_DASHBOARD_URL_HERE') {
                    const iframe = document.getElementById('rep-dashboard-iframe');
                    const placeholder = document.getElementById('rep-placeholder');

                    iframe.src = config.repManagerDashboardUrl;
                    iframe.classList.remove('hidden');
                    placeholder.classList.add('hidden');
                }
            } catch (error) {
                console.log('Using placeholder - config not available');
            }
        }

        loadDashboard();
    </script>
</body>
</html>
