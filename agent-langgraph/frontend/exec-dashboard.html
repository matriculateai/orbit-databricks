<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orbit - Executive Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0F1115;
            --surface-dark: #181B21;
            --primary: #00A3FF;
            --text-primary: #FFFFFF;
            --text-secondary: #8B949E;
            --border: #2D333B;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            height: 60px;
            background-color: var(--surface-dark);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 24px;
            justify-content: space-between;
        }

        .logo {
            font-weight: 600;
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo span {
            color: var(--primary);
            font-size: 12px;
            background: rgba(0, 163, 255, 0.1);
            padding: 4px 8px;
            border-radius: 4px;
        }

        .nav-links {
            display: flex;
            gap: 24px;
        }

        .nav-link {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 14px;
            transition: color 0.2s;
        }

        .nav-link:hover {
            color: var(--text-primary);
        }

        .dashboard-container {
            flex: 1;
            background-color: var(--bg-dark);
            position: relative;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: var(--bg-dark);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 16px;
            z-index: 10;
        }

        .spinner {
            width: 24px;
            height: 24px;
            border: 2px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .error-message {
            color: #ff4444;
            display: none;
            text-align: center;
            padding: 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo">
            ORBIT <span>EXECUTIVE</span>
        </div>
        <nav class="nav-links">
            <a href="/" class="nav-link">Home</a>
            <a href="/rep-dashboard.html" class="nav-link">Rep View</a>
        </nav>
    </header>

    <div class="dashboard-container">
        <div id="loading" class="loading-overlay">
            <div class="spinner"></div>
            <div id="status-text" style="color: var(--text-secondary); font-size: 14px;">Loading Dashboard...</div>
            <div id="error-msg" class="error-message"></div>
        </div>
        <iframe id="dashboard-frame" allow="autoplay"></iframe>
    </div>

    <script>
        const statusText = document.getElementById('status-text');
        const errorMsg = document.getElementById('error-msg');
        const spinner = document.querySelector('.spinner');
        const loadingOverlay = document.getElementById('loading');
        const iframe = document.getElementById('dashboard-frame');

        async function initDashboard() {
            try {
                // 1. Get Configuration
                const configResponse = await fetch('/api/config');
                const config = await configResponse.json();

                if (!config.execDashboardUrl) {
                    throw new Error('Executive Dashboard URL not configured (ORBIT_EXEC_DASHBOARD_URL)');
                }

                // 2. Load Iframe
                console.log('Loading dashboard from:', config.execDashboardUrl);
                
                // Add query params to ensure header is hidden if supported
                const url = new URL(config.execDashboardUrl);
                url.searchParams.set('embedded', 'true');
                url.searchParams.set('hideHeader', 'true'); // Common param for clean view

                iframe.src = url.toString();

                // 3. Handle Load State
                iframe.onload = () => {
                    loadingOverlay.style.display = 'none';
                    console.log('Dashboard iframe loaded');
                };

            } catch (err) {
                console.error('Initialization failed:', err);
                spinner.style.display = 'none';
                statusText.style.display = 'none';
                errorMsg.style.display = 'block';
                errorMsg.textContent = `Error: ${err.message}. Please check your .env configuration.`;
            }
        }

        // Start
        initDashboard();
    </script>
</body>
</html>
