<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orbit - Executive Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        /* Dashboard-specific overrides */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
        }

        .dashboard-header {
            height: 72px;
            background-color: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            padding: 0 32px;
            justify-content: space-between;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.15);
        }

        .dashboard-header .logo {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .dashboard-header .logo-image {
            height: 40px;
            width: auto;
        }

        .dashboard-header .logo-text {
            font-size: 22px;
            font-weight: 700;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .dashboard-header .badge {
            font-size: 11px;
            color: white;
            background: var(--accent-gradient);
            padding: 6px 12px;
            border-radius: 8px;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 0.8px;
            box-shadow: 0 2px 8px rgba(99, 102, 241, 0.3);
        }

        .nav-links {
            display: flex;
            gap: 8px;
        }

        .nav-link {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            padding: 10px 18px;
            border-radius: 10px;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .nav-link:hover {
            color: var(--text-primary);
            background-color: var(--bg-hover);
            transform: translateY(-1px);
        }

        .dashboard-embed-container {
            flex: 1;
            background-color: var(--bg-primary);
            position: relative;
            overflow: hidden;
        }

        .dashboard-embed-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: var(--bg-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 20px;
            z-index: 10;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border-color);
            border-top-color: var(--accent-primary);
            border-bottom-color: var(--accent-secondary);
            border-radius: 50%;
            animation: spin 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
        }

        .loading-text {
            color: var(--text-secondary);
            font-size: 15px;
            font-weight: 500;
        }

        .error-message {
            color: var(--error);
            display: none;
            text-align: center;
            padding: 24px 32px;
            background-color: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 16px;
            max-width: 500px;
            font-size: 14px;
            line-height: 1.6;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <header class="dashboard-header">
        <div class="logo">
            <img src="/images/orbit-logo.png" alt="Orbit" class="logo-image">
            <span class="badge">Executive</span>
        </div>
        <nav class="nav-links">
            <a href="/" class="nav-link">Home</a>
            <a href="/rep-dashboard.html" class="nav-link">Rep View</a>
        </nav>
    </header>

    <div class="dashboard-embed-container">
        <div id="loading" class="loading-overlay">
            <div class="spinner"></div>
            <div id="status-text" class="loading-text">Loading Dashboard...</div>
            <div id="error-msg" class="error-message"></div>
        </div>
        <iframe id="dashboard-frame" allow="autoplay"></iframe>
    </div>

    <script>
        const statusText = document.getElementById('status-text');
        const errorMsg = document.getElementById('error-msg');
        const spinner = document.querySelector('.spinner');
        const loadingOverlay = document.getElementById('loading');
        const iframe = document.getElementById('dashboard-frame');

        async function initDashboard() {
            try {
                // 1. Get Configuration
                const configResponse = await fetch('/api/config');
                const config = await configResponse.json();

                if (!config.execDashboardUrl) {
                    throw new Error('Executive Dashboard URL not configured (ORBIT_EXEC_DASHBOARD_URL)');
                }

                // 2. Load Iframe
                console.log('Loading dashboard from:', config.execDashboardUrl);
                
                // Add query params to ensure header is hidden if supported
                const url = new URL(config.execDashboardUrl);
                url.searchParams.set('embedded', 'true');
                url.searchParams.set('hideHeader', 'true'); // Common param for clean view

                iframe.src = url.toString();

                // 3. Handle Load State
                iframe.onload = () => {
                    loadingOverlay.style.display = 'none';
                    console.log('Dashboard iframe loaded');
                };

            } catch (err) {
                console.error('Initialization failed:', err);
                spinner.style.display = 'none';
                statusText.style.display = 'none';
                errorMsg.style.display = 'block';
                errorMsg.textContent = `Error: ${err.message}. Please check your .env configuration.`;
            }
        }

        // Start
        initDashboard();
    </script>
</body>
</html>
