<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Executive Dashboard | Orbit</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <nav class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <svg class="logo-icon" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="20" cy="20" r="18" stroke="url(#orbit-gradient)" stroke-width="2.5" fill="none"/>
                        <circle cx="20" cy="20" r="8" fill="url(#orbit-gradient)"/>
                        <circle cx="20" cy="6" r="3" fill="#6366f1"/>
                        <defs>
                            <linearGradient id="orbit-gradient" x1="0" y1="0" x2="40" y2="40">
                                <stop offset="0%" stop-color="#6366f1"/>
                                <stop offset="100%" stop-color="#8b5cf6"/>
                            </linearGradient>
                        </defs>
                    </svg>
                    <span class="logo-text">Orbit</span>
                </div>
            </div>

            <div class="nav-section">
                <a href="/" class="nav-item">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                    </svg>
                    <span>Chat</span>
                </a>
                <a href="/rep-dashboard.html" class="nav-item">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                        <circle cx="9" cy="7" r="4"/>
                        <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                        <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                    </svg>
                    <span>Rep Manager</span>
                </a>
                <a href="/exec-dashboard.html" class="nav-item active">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 3v18h18"/>
                        <path d="M18 17V9"/>
                        <path d="M13 17V5"/>
                        <path d="M8 17v-3"/>
                    </svg>
                    <span>Executive</span>
                </a>
            </div>

            <div class="sidebar-footer">
                <div class="powered-by">
                    <span class="powered-text">Powered by</span>
                    <span class="senture-brand">Senture</span>
                </div>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="main-content">
            <div class="dashboard-container">
                <div class="dashboard-header">
                    <h1>Executive Dashboard</h1>
                    <p>High-level business metrics and strategic insights</p>
                </div>

                <div class="dashboard-frame-container" id="exec-dashboard-container">
                    <div class="dashboard-placeholder" id="exec-placeholder">
                        <svg class="placeholder-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M3 3v18h18"/>
                            <path d="M18 17V9"/>
                            <path d="M13 17V5"/>
                            <path d="M8 17v-3"/>
                        </svg>
                        <h3>Executive Dashboard</h3>
                        <p id="status-text">Loading...</p>
                        <a id="dashboard-link" href="#" target="_blank" class="dashboard-button hidden">
                            Open Dashboard
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
                                <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
                                <polyline points="15 3 21 3 21 9"/>
                                <line x1="10" y1="14" x2="21" y2="3"/>
                            </svg>
                        </a>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <style>
        .dashboard-button {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 24px;
            padding: 12px 24px;
            background: var(--accent-gradient);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 500;
            transition: all 0.2s ease;
        }
        .dashboard-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4);
        }
    </style>

    <script>
        async function loadDashboard() {
            const statusText = document.getElementById('status-text');
            const dashboardLink = document.getElementById('dashboard-link');

            try {
                const response = await fetch('/api/config');
                if (!response.ok) throw new Error('Config API failed');

                const config = await response.json();
                const url = config.execDashboardUrl;

                if (!url || url === 'YOUR_EXEC_DASHBOARD_URL_HERE' || url === '') {
                    statusText.textContent = 'Dashboard URL not configured in app.yaml';
                } else {
                    statusText.textContent = 'Click below to open the dashboard in a new tab';
                    dashboardLink.href = url;
                    dashboardLink.classList.remove('hidden');
                }
            } catch (error) {
                console.error('Error loading config:', error);
                statusText.textContent = 'Failed to load configuration';
            }
        }

        loadDashboard();
    </script>
</body>
</html>
